<!DOCTYPE html>

<html>

<body>

<h1>
Add Maintenance Log
</h1>

<form method="POST">

<input
type="date"
name="maintenance_date"
required>

<br><br>

<input
name="technician_name"
placeholder="Technician"
required>

<br><br>

<textarea
name="issue_reported"
placeholder="Issue">
</textarea>

<br><br>

<textarea
name="resolution_notes"
placeholder="Resolution">
</textarea>

<br><br>

<input
type="date"
name="next_due_date">

<br><br>

<button>
Save
</button>

</form>

</body>

</html>
